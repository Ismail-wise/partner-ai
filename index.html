<!DOCTYPE html>
<html>
<head>
  <title>Partner AI</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      overflow: hidden;
    }

    .chat-container {
      width: 100%;
      max-width: 750px;
      height: 95vh;
      background: #1e293b;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    /* HEADER */
    .chat-header {
      padding: 15px;
      background: #020617;
      border-bottom: 1px solid #334155;
      text-align: center;
      font-weight: bold;
      letter-spacing: 1px;
    }

    /* CHAT AREA */
    .chat-box {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* MESSAGE ROW */
    .message-row {
      display: flex;
      align-items: flex-end;
      animation: fadeIn 0.3s ease;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message-row.ai {
      justify-content: flex-start;
    }

    /* AVATAR */
    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      margin: 0 8px;
    }

    /* MESSAGE */
    .message {
      padding: 12px 14px;
      border-radius: 14px;
      max-width: 75%;
      white-space: pre-wrap;
      font-size: 14px;
      line-height: 1.5;
    }

    .user .message {
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      color: black;
    }

    .ai .message {
      background: #334155;
    }

    /* INPUT AREA */
    .input-box {
      display: flex;
      padding: 12px;
      border-top: 1px solid rgba(255,255,255,0.05);
      background: #020617;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: #0f172a;
      color: white;
      font-size: 14px;
    }

    button {
      margin-left: 10px;
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    /* SCROLLBAR */
    .chat-box::-webkit-scrollbar {
      width: 6px;
    }

    .chat-box::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 10px;
    }

    /* ANIMATION */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* TYPING DOTS */
    .dots span {
      animation: blink 1.4s infinite;
    }

    .dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes blink {
      0% { opacity: 0.2; }
      20% { opacity: 1; }
      100% { opacity: 0.2; }
    }
  </style>
</head>

<body>

<div class="chat-container">

  <div class="chat-header"> 
    🤖 Ray's GPT
  </div>

  <div id="chatBox" class="chat-box"></div>

  <div class="input-box">
    <input id="userInput" placeholder="Ask something..." />
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<script>
const API_URL = "https://caressive-heide-bedless.ngrok-free.dev";

async function sendMessage() {
  const inputField = document.getElementById("userInput");
  const message = inputField.value;

  if (!message.trim()) return;

  addMessage(message, "user");
  inputField.value = "";

  const typingId = showTyping();

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    removeTyping(typingId);
    addMessage(data.reply || "⚠️ No response", "ai");

  } catch (error) {
    removeTyping(typingId);
    addMessage("⚠️ Error connecting to server", "ai");
  }
}

/* ENTER KEY SUPPORT */
document.getElementById("userInput").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    sendMessage();
  }
});

function addMessage(text, type) {
  const chatBox = document.getElementById("chatBox");

  const row = document.createElement("div");
  row.classList.add("message-row", type);

  const avatar = document.createElement("img");
  avatar.classList.add("avatar");

  avatar.src = type === "user"
    ? "https://api.dicebear.com/7.x/adventurer/svg?seed=User"
    : "https://api.dicebear.com/7.x/bottts/svg?seed=AI";

  const msg = document.createElement("div");
  msg.classList.add("message");
  msg.innerText = text;

  if (type === "user") {
    row.appendChild(msg);
    row.appendChild(avatar);
  } else {
    row.appendChild(avatar);
    row.appendChild(msg);
  }

  chatBox.appendChild(row);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function showTyping() {
  const chatBox = document.getElementById("chatBox");

  const row = document.createElement("div");
  row.classList.add("message-row", "ai");
  row.id = "typing";

  const avatar = document.createElement("img");
  avatar.classList.add("avatar");
  avatar.src = "https://api.dicebear.com/7.x/bottts/svg?seed=AI";

  const msg = document.createElement("div");
  msg.classList.add("message");
  msg.innerHTML = "AI is typing <span class='dots'><span>.</span><span>.</span><span>.</span></span>";

  row.appendChild(avatar);
  row.appendChild(msg);

  chatBox.appendChild(row);
  chatBox.scrollTop = chatBox.scrollHeight;

  return "typing";
}

function removeTyping(id) {
  const typing = document.getElementById(id);
  if (typing) typing.remove();
}
</script>

</body>
</html>
