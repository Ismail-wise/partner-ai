<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partner AI</title>
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --bg-base: #060b17;
    --bg-surface: #0d1526;
    --bg-card: #111d35;
    --bg-input: #0d1a30;
    --accent-blue: #3b82f6;
    --accent-cyan: #06b6d4;
    --accent-green: #10b981;
    --text-primary: #f0f6ff;
    --text-secondary: #8ba3c7;
    --border: rgba(59, 130, 246, 0.15);
    --glow: rgba(59, 130, 246, 0.25);
    --user-msg: linear-gradient(135deg, #1d4ed8, #0ea5e9);
    --ai-msg: #111d35;
  }

  html, body {
    height: 100%;
  }

  body {
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: var(--bg-base);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    color: var(--text-primary);
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(59,130,246,0.12), transparent),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(6,182,212,0.07), transparent);
  }

  /* ── LAYOUT ── */
  .chat-wrapper {
    width: 100%;
    max-width: 820px;
    height: 96vh;
    display: flex;
    flex-direction: column;
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.03),
      0 25px 80px rgba(0,0,0,0.6),
      0 0 60px rgba(59,130,246,0.08);
    background: var(--bg-surface);
  }

  /* ── HEADER ── */
  .chat-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 22px;
    background: linear-gradient(180deg, rgba(15,28,54,0.95) 0%, rgba(13,21,38,0.9) 100%);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px);
    position: relative;
  }

  .chat-header::after {
    content: "";
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(59,130,246,0.5), rgba(6,182,212,0.5), transparent);
  }

  .header-avatar {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    background: linear-gradient(135deg, #1d4ed8, #06b6d4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    box-shadow: 0 0 20px rgba(59,130,246,0.4);
  }

  .header-info {
    flex: 1;
  }

  .header-info h1 {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: linear-gradient(90deg, #e0f2fe, #bae6fd, #a5f3fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-status {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent-green);
    box-shadow: 0 0 6px var(--accent-green);
    animation: pulse-dot 2s ease infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .header-badge {
    background: rgba(59,130,246,0.15);
    border: 1px solid rgba(59,130,246,0.3);
    color: #93c5fd;
    font-size: 10px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* ── CHAT BOX ── */
  .chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .chat-box::-webkit-scrollbar {
    width: 5px;
  }

  .chat-box::-webkit-scrollbar-track {
    background: transparent;
  }

  .chat-box::-webkit-scrollbar-thumb {
    background: rgba(59,130,246,0.25);
    border-radius: 10px;
  }

  .chat-box::-webkit-scrollbar-thumb:hover {
    background: rgba(59,130,246,0.45);
  }

  /* ── WELCOME ── */
  .welcome-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    text-align: center;
    padding: 20px;
    animation: fadeUp 0.5s ease;
  }

  .welcome-icon {
    width: 70px;
    height: 70px;
    border-radius: 20px;
    background: linear-gradient(135deg, #1e3a8a, #0891b2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 34px;
    box-shadow: 0 0 40px rgba(59,130,246,0.3);
  }

  .welcome-screen h2 {
    font-size: 22px;
    font-weight: 700;
    background: linear-gradient(90deg, #e0f2fe, #a5f3fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .welcome-screen p {
    font-size: 13px;
    color: var(--text-secondary);
    max-width: 340px;
    line-height: 1.6;
  }

  .welcome-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 6px;
  }

  .chip {
    background: rgba(59,130,246,0.1);
    border: 1px solid rgba(59,130,246,0.25);
    color: #93c5fd;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .chip:hover {
    background: rgba(59,130,246,0.2);
    border-color: rgba(59,130,246,0.5);
    transform: translateY(-1px);
  }

  /* ── MESSAGE ROW ── */
  .message-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    animation: fadeUp 0.25s ease;
  }

  .message-row.user {
    flex-direction: row-reverse;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── AVATAR ── */
  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    flex-shrink: 0;
    object-fit: cover;
    border: 1px solid var(--border);
  }

  /* ── BUBBLE ── */
  .message-bubble {
    max-width: 72%;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .message-row.user .message-bubble {
    align-items: flex-end;
  }

  .message-text {
    padding: 11px 15px;
    border-radius: 16px;
    font-size: 13.5px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .message-row.user .message-text {
    background: var(--user-msg);
    color: #fff;
    border-bottom-right-radius: 4px;
    box-shadow: 0 4px 20px rgba(14,165,233,0.25);
  }

  .message-row.ai .message-text {
    background: var(--ai-msg);
    color: var(--text-primary);
    border-bottom-left-radius: 4px;
    border: 1px solid var(--border);
  }

  .message-time {
    font-size: 10px;
    color: var(--text-secondary);
    opacity: 0.7;
    padding: 0 4px;
  }

  /* ── TYPING ── */
  .typing-dots {
    display: flex;
    gap: 5px;
    padding: 14px 16px;
    background: var(--ai-msg);
    border: 1px solid var(--border);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }

  .typing-dots span {
    width: 7px;
    height: 7px;
    background: var(--accent-blue);
    border-radius: 50%;
    animation: blink 1.3s ease infinite;
    opacity: 0.4;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    40%       { opacity: 1;   transform: scale(1.3); }
  }

  /* ── INPUT AREA ── */
  .input-area {
    padding: 14px 16px;
    background: linear-gradient(180deg, rgba(13,21,38,0.8), rgba(6,11,23,0.95));
    border-top: 1px solid var(--border);
  }

  .input-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 6px 6px 6px 16px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-row:focus-within {
    border-color: rgba(59,130,246,0.5);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
  }

  .chat-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-primary);
    font-size: 14px;
    font-family: inherit;
    padding: 6px 0;
    caret-color: var(--accent-blue);
  }

  .chat-input::placeholder {
    color: var(--text-secondary);
    opacity: 0.6;
  }

  .send-btn {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #1d4ed8, #0891b2);
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    box-shadow: 0 4px 14px rgba(59,130,246,0.35);
  }

  .send-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 20px rgba(59,130,246,0.5);
  }

  .send-btn:active {
    transform: scale(0.95);
  }

  .send-btn svg {
    width: 17px;
    height: 17px;
    fill: currentColor;
  }

  .input-footer {
    text-align: center;
    font-size: 10px;
    color: var(--text-secondary);
    opacity: 0.45;
    margin-top: 8px;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    body { align-items: flex-start; }
    .chat-wrapper { height: 100dvh; border-radius: 0; border: none; }
    .message-bubble { max-width: 85%; }
  }
</style>
</head>
<body>

<div class="chat-wrapper">

  <!-- HEADER -->
  <div class="chat-header">
    <div class="header-avatar">🤖</div>
    <div class="header-info">
      <h1>Partner AI</h1>
      <div class="header-status">
        <span class="status-dot"></span>
        Online &amp; ready to help
      </div>
    </div>
    <span class="header-badge">AI</span>
  </div>

  <!-- CHAT BOX -->
  <div id="chatBox" class="chat-box">
    <div class="welcome-screen" id="welcomeScreen">
      <div class="welcome-icon">🤖</div>
      <h2>How can I help you today?</h2>
      <p>Ask me anything — I'm your intelligent partner for learning, problem-solving, and more.</p>
      <div class="welcome-chips">
        <span class="chip" onclick="sendChip(this)">Explain a concept</span>
        <span class="chip" onclick="sendChip(this)">Help me code</span>
        <span class="chip" onclick="sendChip(this)">Summarize text</span>
        <span class="chip" onclick="sendChip(this)">Write for me</span>
      </div>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <div class="input-row">
      <input
        id="userInput"
        class="chat-input"
        type="text"
        placeholder="Ask me anything…"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="send-btn" onclick="sendMessage()" aria-label="Send message">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <div class="input-footer">Partner AI &middot; Powered by AI</div>
  </div>

</div>

<script>
  const API_URL = "https://partner-ai-56kh.onrender.com/chat";
  const chatBox  = document.getElementById("chatBox");
  const userInput = document.getElementById("userInput");

  function getTime() {
    return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  function removeWelcome() {
    const w = document.getElementById("welcomeScreen");
    if (w) w.remove();
  }

  function addMessage(text, type) {
    removeWelcome();

    const row = document.createElement("div");
    row.className = "message-row " + type;

    const avatar = document.createElement("img");
    avatar.className = "msg-avatar";
    avatar.alt = type === "user" ? "You" : "AI";
    avatar.src = type === "user"
      ? "https://api.dicebear.com/7.x/adventurer/svg?seed=partner-user"
      : "https://api.dicebear.com/7.x/bottts/svg?seed=partner-ai";

    const bubble = document.createElement("div");
    bubble.className = "message-bubble";

    const msgText = document.createElement("div");
    msgText.className = "message-text";
    msgText.textContent = text;

    const time = document.createElement("div");
    time.className = "message-time";
    time.textContent = getTime();

    bubble.appendChild(msgText);
    bubble.appendChild(time);

    if (type === "user") {
      row.appendChild(bubble);
      row.appendChild(avatar);
    } else {
      row.appendChild(avatar);
      row.appendChild(bubble);
    }

    chatBox.appendChild(row);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function showTyping() {
    removeWelcome();

    const row = document.createElement("div");
    row.className = "message-row ai";

    const avatar = document.createElement("img");
    avatar.className = "msg-avatar";
    avatar.alt = "AI";
    avatar.src = "https://api.dicebear.com/7.x/bottts/svg?seed=partner-ai";

    const dots = document.createElement("div");
    dots.className = "typing-dots";
    dots.innerHTML = "<span></span><span></span><span></span>";

    row.appendChild(avatar);
    row.appendChild(dots);
    chatBox.appendChild(row);
    chatBox.scrollTop = chatBox.scrollHeight;

    return row;
  }

  async function sendMessage() {
    const message = userInput.value.trim();
    if (!message) return;

    addMessage(message, "user");
    userInput.value = "";
    userInput.focus();

    const typingEl = showTyping();

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message })
      });

      if (!res.ok) throw new Error("Server error " + res.status);

      const data = await res.json();
      typingEl.remove();
      addMessage(data.reply || "No response received.", "ai");

    } catch (err) {
      typingEl.remove();
      addMessage("Could not reach the server. Please try again.", "ai");
    }
  }

  function sendChip(el) {
    userInput.value = el.textContent;
    sendMessage();
  }

  userInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>

</body>
</html>
